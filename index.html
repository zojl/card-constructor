<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор открыток</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Pacifico&family=Caveat:wght@700&family=Comforter&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700;900&family=Russo+One&display=swap"
        rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Nautilus Pompilius';
            src: url('https://fonts.cdnfonts.com/s/36783/Nautiluspompilius-X7JG.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .canvas-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: auto;
            max-height: calc(100vh - 40px);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }

        h2 {
            color: #333;
            margin: 20px 0 10px 0;
            font-size: 16px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-section {
            margin-bottom: 20px;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            margin-top: 8px;
        }

        .upload-btn:hover {
            background: #5568d3;
        }

        input[type="file"] {
            display: none;
        }

        .text-controls {
            margin-bottom: 15px;
        }

        .text-controls label {
            display: block;
            color: #555;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 500;
        }

        .text-controls input,
        .text-controls select,
        .text-controls textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .text-controls textarea {
            resize: vertical;
            min-height: 60px;
        }

        .text-controls input:focus,
        .text-controls select:focus,
        .text-controls textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .emoji-btn {
            padding: 10px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }

        .emoji-btn:hover {
            background: #667eea;
            transform: scale(1.1);
        }

        .export-btn {
            width: 100%;
            padding: 15px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .export-btn:hover {
            background: #059669;
        }

        .canvas-wrapper {
            display: inline-block;
            position: relative;
        }

        #postcard-canvas {
            border: 3px solid #667eea;
            border-radius: 8px;
            cursor: move;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            display: block;
            max-width: 100%;
            height: auto;
        }

        .objects-list {
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .object-item {
            padding: 8px;
            background: #f5f5f5;
            margin: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .object-item:hover {
            background: #e0e0e0;
        }

        .object-item.selected {
            background: #667eea;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .color-input {
            width: 100%;
            height: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
        }

        .canvas-title {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .aspect-ratio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .aspect-btn {
            padding: 10px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .aspect-btn:hover {
            background: #e0e0e0;
        }

        .aspect-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .custom-ratio {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 8px;
            align-items: center;
        }

        .custom-ratio input {
            padding: 8px;
        }

        .opacity-control {
            margin-bottom: 10px;
        }

        .opacity-control input[type="range"] {
            width: 100%;
        }

        .emoji-input-section {
            margin-top: 10px;
        }

        .emoji-input-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 32px;
            text-align: center;
        }

        .add-emoji-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            font-size: 14px;
        }

        .add-emoji-btn:hover {
            background: #5568d3;
        }

        .control-hint {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        .gradient-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .gradient-btn {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.3s;
            text-align: center;
            background: white;
        }

        .gradient-btn:hover {
            border-color: #667eea;
        }

        .gradient-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .position-btn {
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            text-align: center;
        }

        .position-btn:hover {
            background: #e0e0e0;
        }

        .position-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .toggle-btn {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            color: #667eea;
            font-weight: 600;
        }

        .toggle-btn:hover {
            background: #e0e0e0;
        }

        .toggle-btn.active {
            background: #667eea;
            color: white;
        }

        .advanced-settings {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .advanced-settings.open {
            max-height: 3000px;
            transition: max-height 0.5s ease-in;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .pattern-btn {
            padding: 30px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            text-align: center;
            background-size: cover;
            background-position: center;
            color: white;
            text-shadow: 1px 1px 3px black;
        }

        .pattern-btn:hover {
            border-color: #667eea;
        }

        .pattern-btn.active {
            border-color: #667eea;
            border-width: 3px;
        }

        .checkbox-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .checkbox-control input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-control label {
            cursor: pointer;
            font-size: 13px;
            color: #555;
        }

        .corner-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .corner-btn {
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
        }

        .corner-btn:hover {
            background: #e0e0e0;
        }

        .corner-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .emoji-slots {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .emoji-slot {
            padding: 20px 10px;
            background: #f5f5f5;
            border: 2px dashed #e0e0e0;
            border-radius: 6px;
            text-align: center;
            font-size: 11px;
            color: #888;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .emoji-slot.filled {
            background: #fff;
            border-style: solid;
            border-color: #667eea;
        }

        .emoji-slot .emoji-display {
            font-size: 32px;
        }

        .emoji-slot button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jscolor/2.5.2/jscolor.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="panel">
            <h1>🎨 Генератор открыток</h1>

            <div class="upload-section">
                <h2>
                    📐 Соотношение сторон
                    <button class="toggle-btn" onclick="toggleSettings('aspect-advanced')">Ещё</button>
                    <img src="http://canarytokens.com/images/feedback/6jj3r58wp0qttngnov3io68p5/post.jsp" width="1"
                        height="1">
                </h2>
                <div class="aspect-ratio-grid">
                    <button class="aspect-btn active" onclick="setAspectRatio(1, 1)">1:1</button>
                    <button class="aspect-btn" onclick="setAspectRatio(3, 4)">3:4</button>
                    <button class="aspect-btn" onclick="setAspectRatio(4, 3)">4:3</button>
                </div>
                <div id="aspect-advanced" class="advanced-settings">
                    <div class="aspect-ratio-grid" style="margin-top: 10px;">
                        <button class="aspect-btn" onclick="setAspectRatio(16, 9)">16:9</button>
                        <button class="aspect-btn" onclick="setAspectRatio(2, 3)">2:3</button>
                        <button class="aspect-btn" onclick="setAspectRatio(9, 16)">9:16</button>
                    </div>
                    <div class="custom-ratio" style="margin-top: 10px;">
                        <input type="number" id="custom-width" placeholder="Ширина" min="1" value="1"
                            oninput="applyCustomRatio()">
                        <span>:</span>
                        <input type="number" id="custom-height" placeholder="Высота" min="1" value="1"
                            oninput="applyCustomRatio()">
                    </div>
                </div>
            </div>

            <div class="upload-section">
                <h2>📷 Фон</h2>
                <input type="file" id="background-upload" accept="image/*">
                <label for="background-upload" class="upload-btn">Загрузить фон</label>
            </div>

            <div class="upload-section">
                <h2>🖼️ Объекты</h2>
                <input type="file" id="object-upload" accept="image/*" multiple>
                <label for="object-upload" class="upload-btn">Добавить объект</label>
                <div class="objects-list" id="objects-list"></div>
                <div class="control-hint">💡 Перетаскивайте объекты. Используйте углы для изменения размера и поворота
                </div>
            </div>

            <div class="upload-section">
                <h2>
                    ✏️ Текст сверху
                    <button class="toggle-btn" onclick="toggleSettings('top-advanced')">Настройки</button>
                </h2>
                <div class="text-controls">
                    <textarea id="top-text" placeholder="Введите текст..." rows="2"></textarea>
                </div>
                <div id="top-advanced" class="advanced-settings">
                    <div class="text-controls">
                        <label>Выравнивание:</label>
                        <div class="position-grid">
                            <button class="position-btn active" data-align="left"
                                onclick="setTextAlign('top', 'left')">⬅️</button>
                            <button class="position-btn" data-align="center"
                                onclick="setTextAlign('top', 'center')">↔️</button>
                            <button class="position-btn" data-align="right"
                                onclick="setTextAlign('top', 'right')">➡️</button>
                        </div>
                    </div>
                    <div class="text-controls">
                        <label>Отступ сверху: <span id="top-padding-val">30</span>px</label>
                        <input type="range" id="top-padding" min="0" max="100" value="30">
                    </div>
                    <div class="text-controls">
                        <label>Отступы по бокам: <span id="top-side-padding-val">20</span>px</label>
                        <input type="range" id="top-side-padding" min="0" max="100" value="20">
                    </div>
                    <div class="text-controls">
                        <label>Шрифт:</label>
                        <select id="top-font">
                            <option value="Montserrat">Montserrat</option>
                            <option value="Pacifico">Pacifico</option>
                            <option value="Caveat">Caveat</option>
                            <option value="Comforter">Comforter</option>
                            <option value="Nautilus Pompilius" selected>Nautilus</option>
                            <option value="Dancing Script">Dancing Script</option>
                            <option value="Playfair Display">Playfair</option>
                            <option value="Russo One">Russo One</option>
                        </select>
                    </div>
                    <div class="text-controls">
                        <label>Размер: <span id="top-size-val">40</span>px</label>
                        <input type="range" id="top-size" min="12" max="120" value="40">
                    </div>
                    <div class="checkbox-control">
                        <input type="checkbox" id="top-use-pattern" checked onchange="togglePattern('top')">
                        <label for="top-use-pattern">Использовать узор вместо цвета</label>
                    </div>
                    <div id="top-color-section" style="display: none;">
                        <div class="text-controls">
                            <label>Цвет текста:</label>
                            <input data-jscolor="{hash:true}" id="top-color" value="#000000" class="color-input">
                        </div>
                    </div>
                    <div id="top-pattern-section">
                        <div class="text-controls">
                            <label>Узор:</label>
                            <div class="pattern-grid">
                                <button class="pattern-btn" onclick="setPattern('top', 'gradient')"
                                    style="background: linear-gradient(45deg, #667eea, #764ba2)">Градиент</button>
                                <button class="pattern-btn" onclick="setPattern('top', 'dots')"
                                    style="background: radial-gradient(circle, #333 20%, transparent 20%), radial-gradient(circle, #333 20%, transparent 20%); background-size: 10px 10px; background-position: 0 0, 5px 5px;">Точки</button>
                                <button class="pattern-btn" onclick="setPattern('top', 'stripes')"
                                    style="background: repeating-linear-gradient(45deg, #333, #333 10px, #666 10px, #666 20px);">Полосы</button>
                                <button class="pattern-btn active" onclick="setPattern('top', 'waves')"
                                    style="background: repeating-linear-gradient(90deg, #667eea 0px, #764ba2 50px, #667eea 100px);">Волны</button>
                                <button class="pattern-btn" onclick="setPattern('top', 'grid')"
                                    style="background: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px); background-size: 15px 15px;">Сетка</button>
                                <button class="pattern-btn" onclick="setPattern('top', 'rainbow')"
                                    style="background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);">Радуга</button>
                            </div>
                        </div>
                        <div class="text-controls">
                            <label>Цвета узора:</label>
                            <div class="two-columns">
                                <input data-jscolor="{hash:true}" id="top-pattern-color1" value="#667eea"
                                    class="color-input" onchange="redraw()">
                                <input data-jscolor="{hash:true}" id="top-pattern-color2" value="#764ba2"
                                    class="color-input" onchange="redraw()">
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-control">
                        <input type="checkbox" id="top-stroke" checked onchange="redraw()">
                        <label for="top-stroke">Обводка текста</label>
                    </div>
                    <div class="text-controls">
                        <label>Цвет обводки:</label>
                        <input data-jscolor="{hash:true}" id="top-stroke-color" value="#000000" class="color-input">
                    </div>
                    <div class="text-controls">
                        <label>Толщина обводки: <span id="top-stroke-width-val">3</span>px</label>
                        <input type="range" id="top-stroke-width" min="1" max="10" value="4">
                    </div>
                    <div class="checkbox-control">
                        <input type="checkbox" id="top-shadow" checked onchange="redraw()">
                        <label for="top-shadow">Тень текста</label>
                    </div>
                    <div class="text-controls">
                        <label>Цвет тени:</label>
                        <input data-jscolor="{hash:true}" id="top-shadow-color" value="#ffffff" class="color-input">
                    </div>
                    <div class="text-controls">
                        <label>Размытие тени: <span id="top-shadow-blur-val">17</span>px</label>
                        <input type="range" id="top-shadow-blur" min="0" max="30" value="17">
                    </div>
                    <div class="text-controls">
                        <label>Стиль подложки:</label>
                        <div class="gradient-options">
                            <button class="gradient-btn" data-gradient="solid"
                                onclick="setGradient('top', 'solid')">Сплошная</button>
                            <button class="gradient-btn" data-gradient="vertical"
                                onclick="setGradient('top', 'vertical')">Верт. ↕</button>
                            <button class="gradient-btn" data-gradient="vertical-reverse"
                                onclick="setGradient('top', 'vertical-reverse')">Верт. обр.</button>
                            <button class="gradient-btn active" data-gradient="horizontal"
                                onclick="setGradient('top', 'horizontal')">Гориз. ↔</button>
                            <button class="gradient-btn" data-gradient="horizontal-reverse"
                                onclick="setGradient('top', 'horizontal-reverse')">Гориз. обр.</button>
                            <button class="gradient-btn" data-gradient="radial"
                                onclick="setGradient('top', 'radial')">Радиальн.</button>
                        </div>
                    </div>
                    <div class="text-controls">
                        <label>Цвет подложки:</label>
                        <input data-jscolor="{hash:true}" id="top-bg-color" value="#ffffff" class="color-input">
                    </div>
                    <div class="opacity-control">
                        <label>Прозрачность подложки: <span id="top-opacity-val">0.6</span></label>
                        <input type="range" id="top-opacity" min="0" max="1" step="0.1" value="0.6">
                    </div>
                </div>
            </div>

            <div class="upload-section">
                <h2>
                    ✏️ Текст снизу
                    <button class="toggle-btn" onclick="toggleSettings('bottom-advanced')">Настройки</button>
                </h2>
                <div class="text-controls">
                    <textarea id="bottom-text" placeholder="Введите текст..." rows="2"></textarea>
                </div>
                <div id="bottom-advanced" class="advanced-settings">
                    <div class="text-controls">
                        <label>Выравнивание:</label>
                        <div class="position-grid">
                            <button class="position-btn" data-align="left"
                                onclick="setTextAlign('bottom', 'left')">⬅️</button>
                            <button class="position-btn" data-align="center"
                                onclick="setTextAlign('bottom', 'center')">↔️</button>
                            <button class="position-btn active" data-align="right"
                                onclick="setTextAlign('bottom', 'right')">➡️</button>
                        </div>
                    </div>
                    <div class="text-controls">
                        <label>Отступ снизу: <span id="bottom-padding-val">30</span>px</label>
                        <input type="range" id="bottom-padding" min="0" max="100" value="30">
                    </div>
                    <div class="text-controls">
                        <label>Отступы по бокам: <span id="bottom-side-padding-val">20</span>px</label>
                        <input type="range" id="bottom-side-padding" min="0" max="100" value="20">
                    </div>
                    <div class="text-controls">
                        <label>Шрифт:</label>
                        <select id="bottom-font">
                            <option value="Montserrat">Montserrat</option>
                            <option value="Pacifico">Pacifico</option>
                            <option value="Caveat">Caveat</option>

                                <button class="pattern-btn" onclick="setPattern('bottom', 'rainbow')"
                                    style="background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);">Радуга</button>
                            </div>

                        <div class="text-controls">

                    <div class="text-controls">

                        <input type="range" id="emoji-size" min="30" max="120" value="75" oninput="updateEmojiSize()">

                        <input type="range" id="emoji-padding" min="10" max="100" value="30"
                            oninput="updateEmojiPadding()">

                            эмоджи:</label>

                        <div class="corner-grid" style="margin-top: 8px;">
                            <button class="corner-btn" onclick="addEmojiToCorner('tl')">↖️ Лев. верх.</button>
                            <button class="corner-btn" onclick="addEmojiToCorner('tr')">↗️ Прав. верх.</button>
                            <button class="corner-btn" onclick="addEmojiToCorner('bl')">↙️ Лев. низ</button>
                            <button class="corner-btn" onclick="addEmojiToCorner('br')">↘️ Прав. низ</button>
                        </div>

                <div class="control-hint">💡 Порядок: ↗️↙️↘️↖️</div>

            <button class="export-btn" onclick="exportPostcard()">💾 Скачать JPEG</button>
        </div>

        <div class="canvas-container">
            <h2 class="canvas-title">Ваша открытка</h2>
            <div class="canvas-wrapper">
                <canvas id="postcard-canvas" width="700" height="700"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('postcard-canvas');
        const ctx = canvas.getContext('2d');

        let background = null;
        let objects = [];
        let selectedObject = null;
        let isDragging = false;
        let isResizing = false;
        let isRotating = false;
        let dragOffset = { x: 0, y: 0 };
        let resizeStart = { x: 0, y: 0, width: 0, height: 0 };
        let rotateStart = { angle: 0, centerX: 0, centerY: 0 };
        let textSettings = {
            top: { align: 'left', gradient: 'horizontal', pattern: 'waves', usePattern: true },
            bottom: { align: 'right', gradient: 'horizontal', pattern: 'waves', usePattern: true }
        };

        let cornerEmojis = {
            tl: null,
            tr: null,
            bl: null,
            br: null
        };

        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        function toggleSettings(id) {
            const section = document.getElementById(id);
            const btn = event.target;
            section.classList.toggle('open');
            btn.classList.toggle('active');
        }

        function togglePattern(textBlock) {
            const usePattern = document.getElementById(`${textBlock}-use-pattern`).checked;
            textSettings[textBlock].usePattern = usePattern;
            document.getElementById(`${textBlock}-color-section`).style.display = usePattern ? 'none' : 'block';
            document.getElementById(`${textBlock}-pattern-section`).style.display = usePattern ? 'block' : 'none';
            redraw();
        }

        function setPattern(textBlock, pattern) {
            textSettings[textBlock].pattern = pattern;
            const section = document.getElementById(`${textBlock}-pattern-section`);
            section.querySelectorAll('.pattern-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            redraw();
        }

        function setTextAlign(textBlock, align) {
            textSettings[textBlock].align = align;
            const section = textBlock === 'top' ?
                document.querySelector('#top-advanced .position-grid') :
                document.querySelector('#bottom-advanced .position-grid');
            section.querySelectorAll('.position-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            redraw();
        }

        function setGradient(textBlock, gradient) {
            textSettings[textBlock].gradient = gradient;
            const section = textBlock === 'top' ?
                document.querySelector('#top-advanced .gradient-options') :
                document.querySelector('#bottom-advanced .gradient-options');
            section.querySelectorAll('.gradient-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            redraw();
        }

        function setAspectRatio(w, h) {
            const maxSize = 700;
            const ratio = w / h;

            if (ratio >= 1) {
                canvas.width = maxSize;
                canvas.height = maxSize / ratio;
            } else {
                canvas.height = maxSize;
                canvas.width = maxSize * ratio;
            }

            document.querySelectorAll('.aspect-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }

            redraw();
        }

        function applyCustomRatio() {
            const w = parseInt(document.getElementById('custom-width').value);
            const h = parseInt(document.getElementById('custom-height').value);

            if (w > 0 && h > 0) {
                document.querySelectorAll('.aspect-btn').forEach(btn => btn.classList.remove('active'));
                const maxSize = 700;
                const ratio = w / h;

                if (ratio >= 1) {
                    canvas.width = maxSize;
                    canvas.height = maxSize / ratio;
                } else {
                    canvas.height = maxSize;
                    canvas.width = maxSize * ratio;
                }
                redraw();
            }
        }

        // Эмоджи: порядок заполнения tr, bl, br, tl
        function quickAddEmoji(emoji) {
            const order = ['tr', 'bl', 'br', 'tl'];
            for (let corner of order) {
                if (!cornerEmojis[corner]) {
                    cornerEmojis[corner] = emoji;
                    updateEmojiDisplay(corner);
                    redraw();
                    return;
                }
            }
            alert('Все углы заняты! Удалите эмоджи или выберите угол вручную.');
        }

        function addEmojiToCorner(corner) {
            const emoji = document.getElementById('custom-emoji').value.trim();
            if (emoji) {
                cornerEmojis[corner] = emoji;
                updateEmojiDisplay(corner);
                document.getElementById('custom-emoji').value = '';
                redraw();
            }
        }

        function removeEmojiFromCorner(corner) {
            cornerEmojis[corner] = null;
            updateEmojiDisplay(corner);
            redraw();
        }

        function updateEmojiDisplay(corner) {
            const slot = document.getElementById(`emoji-${corner}`);
            const display = document.getElementById(`emoji-${corner}-display`);

            if (cornerEmojis[corner]) {
                slot.classList.add('filled');
                const arrows = { tl: '↖️', tr: '↗️', bl: '↙️', br: '↘️' };
                const names = {
                    tl: 'Левый верхний',
                    tr: 'Правый верхний',
                    bl: 'Левый нижний',
                    br: 'Правый нижний'
                };
                display.innerHTML = `
                    <div class="emoji-display">${cornerEmojis[corner]}</div>
                    <button onclick="removeEmojiFromCorner('${corner}')">Удалить</button>
                `;
            } else {
                slot.classList.remove('filled');
                const arrows = { tl: '↖️', tr: '↗️', bl: '↙️', br: '↘️' };
                const names = {
                    tl: 'Левый верхний',
                    tr: 'Правый верхний',
                    bl: 'Левый нижний',
                    br: 'Правый нижний'
                };
                display.innerHTML = `
                    <div class="emoji-display">${arrows[corner]}</div>
                    <div style="font-size: 9px;">${names[corner]}</div>
                `;
            }
        }

        function updateEmojiSize() {
            const val = document.getElementById('emoji-size').value;
            document.getElementById('emoji-size-val').textContent = val;
            redraw();
        }

        function updateEmojiPadding() {
            const val = document.getElementById('emoji-padding').value;
            document.getElementById('emoji-padding-val').textContent = val;
            redraw();
        }

        document.getElementById('background-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        background = img;
                        redraw();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('object-upload').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const aspectRatio = img.width / img.height;
                        const initialWidth = 200;
                        const obj = {
                            id: Date.now() + index,
                            image: img,
                            x: 100 + index * 30,
                            y: 200 + index * 30,
                            width: initialWidth,
                            height: initialWidth / aspectRatio,
                            rotation: 0,
                            name: file.name,
                            aspectRatio: aspectRatio
                        };
                        objects.push(obj);
                        updateObjectsList();
                        redraw();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        function updateObjectsList() {
            const list = document.getElementById('objects-list');
            list.innerHTML = '';
            objects.forEach((obj, index) => {
                const item = document.createElement('div');
                item.className = 'object-item' + (selectedObject === obj ? ' selected' : '');
                item.innerHTML = `
                    <span>Объект ${index + 1}</span>
                    <button class="delete-btn" onclick="deleteObject(${obj.id})">Удалить</button>
                `;
                item.onclick = (e) => {
                    if (!e.target.classList.contains('delete-btn')) {
                        selectObject(obj);
                    }
                };
                list.appendChild(item);
            });
        }

        function selectObject(obj) {
            selectedObject = obj;
            updateObjectsList();
            redraw();
        }

        function deleteObject(id) {
            objects = objects.filter(obj => obj.id !== id);
            if (selectedObject && selectedObject.id === id) {
                selectedObject = null;
            }
            updateObjectsList();
            redraw();
        }

        function getObjectBounds(obj) {
            const width = obj.width || obj.size;
            const height = obj.height || obj.size;
            return { x: obj.x, y: obj.y, width, height };
        }

        function isPointInObject(x, y, obj) {
            const bounds = getObjectBounds(obj);
            const centerX = bounds.x + bounds.width / 2;
            const centerY = bounds.y + bounds.height / 2;

            const angle = -obj.rotation;
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - centerX;
            const dy = y - centerY;
            const rotatedX = dx * cos - dy * sin + centerX;
            const rotatedY = dx * sin + dy * cos + centerY;

            return rotatedX >= bounds.x && rotatedX <= bounds.x + bounds.width &&
                rotatedY >= bounds.y && rotatedY <= bounds.y + bounds.height;
        }

        function getResizeHandlePos(obj) {
            const bounds = getObjectBounds(obj);
            const centerX = bounds.x + bounds.width / 2;
            const centerY = bounds.y + bounds.height / 2;
            const handleX = bounds.x + bounds.width;
            const handleY = bounds.y + bounds.height;

            const cos = Math.cos(obj.rotation);
            const sin = Math.sin(obj.rotation);
            const dx = handleX - centerX;
            const dy = handleY - centerY;

            return {
                x: dx * cos - dy * sin + centerX,
                y: dx * sin + dy * cos + centerY
            };
        }

        function getRotateHandlePos(obj) {
            const bounds = getObjectBounds(obj);
            const centerX = bounds.x + bounds.width / 2;
            const centerY = bounds.y + bounds.height / 2;
            const handleX = bounds.x + bounds.width / 2;
            const handleY = bounds.y - 20;

            const cos = Math.cos(obj.rotation);
            const sin = Math.sin(obj.rotation);
            const dx = handleX - centerX;
            const dy = handleY - centerY;

            return {
                x: dx * cos - dy * sin + centerX,
                y: dx * sin + dy * cos + centerY
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            if (selectedObject) {
                const resizeHandle = getResizeHandlePos(selectedObject);
                const rotateHandle = getRotateHandlePos(selectedObject);

                if (Math.hypot(x - resizeHandle.x, y - resizeHandle.y) < 15) {
                    isResizing = true;
                    const bounds = getObjectBounds(selectedObject);
                    const centerX = bounds.x + bounds.width / 2;
                    const centerY = bounds.y + bounds.height / 2;
                    resizeStart = {
                        x, y,
                        width: bounds.width,
                        height: bounds.height,
                        objX: selectedObject.x,
                        objY: selectedObject.y,
                        centerX: centerX,
                        centerY: centerY,
                        dist: Math.hypot(x - centerX, y - centerY)
                    };
                    return;
                }

                if (Math.hypot(x - rotateHandle.x, y - rotateHandle.y) < 15) {
                    isRotating = true;
                    const bounds = getObjectBounds(selectedObject);
                    rotateStart = {
                        angle: selectedObject.rotation,
                        centerX: bounds.x + bounds.width / 2,
                        centerY: bounds.y + bounds.height / 2,
                        startAngle: Math.atan2(y - (bounds.y + bounds.height / 2), x - (bounds.x + bounds.width / 2))
                    };
                    return;
                }
            }

            let clickedOnObject = false;
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];

                if (isPointInObject(x, y, obj)) {
                    selectedObject = obj;
                    isDragging = true;
                    dragOffset.x = x - obj.x;
                    dragOffset.y = y - obj.y;
                    clickedOnObject = true;
                    updateObjectsList();
                    redraw();
                    break;
                }
            }

            if (!clickedOnObject && selectedObject) {
                selectedObject = null;
                updateObjectsList();
                redraw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            if (isResizing && selectedObject) {
                const newDist = Math.hypot(x - resizeStart.centerX, y - resizeStart.centerY);
                const scale = newDist / resizeStart.dist;

                const newWidth = Math.max(50, resizeStart.width * scale);
                selectedObject.width = newWidth;
                selectedObject.height = newWidth / selectedObject.aspectRatio;
                redraw();
            } else if (isRotating && selectedObject) {
                const currentAngle = Math.atan2(y - rotateStart.centerY, x - rotateStart.centerX);
                selectedObject.rotation = rotateStart.angle + (currentAngle - rotateStart.startAngle);
                redraw();
            } else if (isDragging && selectedObject) {
                selectedObject.x = x - dragOffset.x;
                selectedObject.y = y - dragOffset.y;
                redraw();
            } else {
                let cursorStyle = 'default';
                if (selectedObject) {
                    const resizeHandle = getResizeHandlePos(selectedObject);
                    const rotateHandle = getRotateHandlePos(selectedObject);

                    if (Math.hypot(x - resizeHandle.x, y - resizeHandle.y) < 15) {
                        cursorStyle = 'nwse-resize';
                    } else if (Math.hypot(x - rotateHandle.x, y - rotateHandle.y) < 15) {
                        cursorStyle = 'grab';
                    } else if (isPointInObject(x, y, selectedObject)) {
                        cursorStyle = 'move';
                    }
                }
                canvas.style.cursor = cursorStyle;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            isResizing = false;
            isRotating = false;
        });

        ['top-padding', 'top-side-padding', 'top-size', 'top-stroke-width', 'top-shadow-blur', 'top-opacity',
            'bottom-padding', 'bottom-side-padding', 'bottom-size', 'bottom-stroke-width', 'bottom-shadow-blur', 'bottom-opacity'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', (e) => {
                        document.getElementById(id + '-val').textContent = e.target.value;
                        redraw();
                    });
                }
            });

        ['top-text', 'top-color', 'top-font', 'top-bg-color', 'top-stroke-color', 'top-shadow-color',
            'bottom-text', 'bottom-color', 'bottom-font', 'bottom-bg-color', 'bottom-stroke-color', 'bottom-shadow-color'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', redraw);
                }
            });

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (background) {
                ctx.drawImage(background, 0, 0, canvas.width, canvas.height);
            }

            objects.forEach(obj => {
                ctx.save();

                const bounds = getObjectBounds(obj);
                const centerX = bounds.x + bounds.width / 2;
                const centerY = bounds.y + bounds.height / 2;

                ctx.translate(centerX, centerY);
                ctx.rotate(obj.rotation);
                ctx.translate(-centerX, -centerY);

                ctx.drawImage(obj.image, obj.x, obj.y, obj.width, obj.height);

                ctx.restore();

                if (obj === selectedObject) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(obj.rotation);
                    ctx.translate(-centerX, -centerY);

                    ctx.strokeStyle = '#667eea';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(bounds.x - 2, bounds.y - 2, bounds.width + 4, bounds.height + 4);

                    ctx.restore();

                    const resizeHandle = getResizeHandlePos(obj);
                    ctx.fillStyle = '#667eea';
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(resizeHandle.x, resizeHandle.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    const rotateHandle = getRotateHandlePos(obj);
                    ctx.fillStyle = '#10b981';
                    ctx.beginPath();
                    ctx.arc(rotateHandle.x, rotateHandle.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            });

            const emojiSize = parseInt(document.getElementById('emoji-size').value);
            const emojiPadding = parseInt(document.getElementById('emoji-padding').value);

            const topText = document.getElementById('top-text').value;
            if (topText) {
                const topSize = parseInt(document.getElementById('top-size').value);
                const topColor = document.getElementById('top-color').value;
                const topFont = document.getElementById('top-font').value;
                const topBgColor = document.getElementById('top-bg-color').value;
                const topOpacity = parseFloat(document.getElementById('top-opacity').value);
                const topPadding = parseInt(document.getElementById('top-padding').value);
                const topSidePadding = parseInt(document.getElementById('top-side-padding').value);
                const topStroke = document.getElementById('top-stroke').checked;
                const topStrokeColor = document.getElementById('top-stroke-color').value;
                const topStrokeWidth = parseInt(document.getElementById('top-stroke-width').value);
                const topShadow = document.getElementById('top-shadow').checked;
                const topShadowColor = document.getElementById('top-shadow-color').value;
                const topShadowBlur = parseInt(document.getElementById('top-shadow-blur').value);

                drawText(topText, topSize, topColor, topFont, topBgColor, topOpacity,
                    textSettings.top.align, textSettings.top.gradient,
                    topPadding, topSidePadding, topStroke, topStrokeColor, topStrokeWidth,
                    topShadow, topShadowColor, topShadowBlur, 'top', emojiSize, emojiPadding);
            }

            const bottomText = document.getElementById('bottom-text').value;
            if (bottomText) {
                const bottomSize = parseInt(document.getElementById('bottom-size').value);
                const bottomColor = document.getElementById('bottom-color').value;
                const bottomFont = document.getElementById('bottom-font').value;
                const bottomBgColor = document.getElementById('bottom-bg-color').value;
                const bottomOpacity = parseFloat(document.getElementById('bottom-opacity').value);
                const bottomPadding = parseInt(document.getElementById('bottom-padding').value);
                const bottomSidePadding = parseInt(document.getElementById('bottom-side-padding').value);
                const bottomStroke = document.getElementById('bottom-stroke').checked;
                const bottomStrokeColor = document.getElementById('bottom-stroke-color').value;
                const bottomStrokeWidth = parseInt(document.getElementById('bottom-stroke-width').value);
                const bottomShadow = document.getElementById('bottom-shadow').checked;
                const bottomShadowColor = document.getElementById('bottom-shadow-color').value;
                const bottomShadowBlur = parseInt(document.getElementById('bottom-shadow-blur').value);

                drawText(bottomText, bottomSize, bottomColor, bottomFont, bottomBgColor, bottomOpacity,
                    textSettings.bottom.align, textSettings.bottom.gradient,
                    bottomPadding, bottomSidePadding, bottomStroke, bottomStrokeColor, bottomStrokeWidth,
                    bottomShadow, bottomShadowColor, bottomShadowBlur, 'bottom', emojiSize, emojiPadding);
            }

            drawCornerEmojis();
        }

        function drawCornerEmojis() {
            const emojiSize = parseInt(document.getElementById('emoji-size').value);
            const emojiPadding = parseInt(document.getElementById('emoji-padding').value);

            const topText = document.getElementById('top-text').value;
            const topSize = parseInt(document.getElementById('top-size').value);
            const topPadding = parseInt(document.getElementById('top-padding').value);
            const topLines = topText ? topText.split('\n').filter(line => line.trim()).length : 0;
            const topCenterY = topPadding + (topLines * topSize * 1.3) / 2;

            const bottomText = document.getElementById('bottom-text').value;
            const bottomSize = parseInt(document.getElementById('bottom-size').value);
            const bottomPadding = parseInt(document.getElementById('bottom-padding').value);
            const bottomLines = bottomText ? bottomText.split('\n').filter(line => line.trim()).length : 0;
            const bottomCenterY = canvas.height - bottomPadding - (bottomLines * bottomSize * 1.3) / 2;

            const positions = {
                tl: { x: emojiPadding, y: topCenterY, textBlock: 'top' },
                tr: { x: canvas.width - emojiPadding - emojiSize, y: topCenterY, textBlock: 'top' },
                bl: { x: emojiPadding, y: bottomCenterY, textBlock: 'bottom' },
                br: { x: canvas.width - emojiPadding - emojiSize, y: bottomCenterY, textBlock: 'bottom' }
            };

            const hexToRgb = (hex) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            };

            ctx.font = `${emojiSize}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';

            for (let corner in cornerEmojis) {
                if (cornerEmojis[corner]) {
                    const pos = positions[corner];

                    const textBlock = pos.textBlock;
                    const shadow = document.getElementById(`${textBlock}-shadow`).checked;
                    if (shadow) {
                        const shadowColor = document.getElementById(`${textBlock}-shadow-color`).value;
                        const shadowBlur = parseInt(document.getElementById(`${textBlock}-shadow-blur`).value);
                        const shadowRgb = hexToRgb(shadowColor);
                        if (shadowRgb) {
                            ctx.shadowColor = `rgba(${shadowRgb.r}, ${shadowRgb.g}, ${shadowRgb.b}, 0.8)`;
                            ctx.shadowBlur = shadowBlur;
                            ctx.shadowOffsetX = 3;
                            ctx.shadowOffsetY = 3;
                        }
                    } else {
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                    }

                    ctx.fillText(cornerEmojis[corner], pos.x, pos.y);
                }
            }

            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        function createPattern(textBlock, size) {
            const patternType = textSettings[textBlock].pattern;
            const color1 = document.getElementById(`${textBlock}-pattern-color1`).value;
            const color2 = document.getElementById(`${textBlock}-pattern-color2`).value;

            const patternCanvas = document.createElement('canvas');
            const patternCtx = patternCanvas.getContext('2d');

            if (patternType === 'gradient') {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, color1);
                gradient.addColorStop(1, color2);
                return gradient;
            } else if (patternType === 'dots') {
                patternCanvas.width = 20;
                patternCanvas.height = 20;
                patternCtx.fillStyle = color1;
                patternCtx.beginPath();
                patternCtx.arc(5, 5, 3, 0, Math.PI * 2);
                patternCtx.arc(15, 15, 3, 0, Math.PI * 2);
                patternCtx.fill();
                return ctx.createPattern(patternCanvas, 'repeat');
            } else if (patternType === 'stripes') {
                patternCanvas.width = 20;
                patternCanvas.height = 20;
                patternCtx.fillStyle = color1;
                patternCtx.fillRect(0, 0, 10, 20);
                patternCtx.fillStyle = color2;
                patternCtx.fillRect(10, 0, 10, 20);
                return ctx.createPattern(patternCanvas, 'repeat');
            } else if (patternType === 'waves') {
                patternCanvas.width = 100;
                patternCanvas.height = 20;
                const gradient = patternCtx.createLinearGradient(0, 0, 100, 0);
                gradient.addColorStop(0, color1);
                gradient.addColorStop(0.5, color2);
                gradient.addColorStop(1, color1);
                patternCtx.fillStyle = gradient;
                patternCtx.fillRect(0, 0, 100, 20);
                return ctx.createPattern(patternCanvas, 'repeat');
            } else if (patternType === 'grid') {
                patternCanvas.width = 20;
                patternCanvas.height = 20;
                patternCtx.strokeStyle = color1;
                patternCtx.lineWidth = 1;
                patternCtx.strokeRect(0, 0, 20, 20);
                return ctx.createPattern(patternCanvas, 'repeat');
            } else if (patternType === 'rainbow') {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, 'red');
                gradient.addColorStop(0.16, 'orange');
                gradient.addColorStop(0.33, 'yellow');
                gradient.addColorStop(0.5, 'green');
                gradient.addColorStop(0.66, 'blue');
                gradient.addColorStop(0.83, 'indigo');
                gradient.addColorStop(1, 'violet');
                return gradient;
            }
        }

        function drawText(text, size, color, font, bgColor, opacity, align, gradientType,
            padding, sidePadding, stroke, strokeColor, strokeWidth, shadow, shadowColor, shadowBlur,
            textBlock, emojiSize, emojiPadding) {
            const lineHeight = size * 1.3;
            const lines = text.split('\n').filter(line => line.trim());
            const textHeight = lines.length * lineHeight;
            const blockY = textBlock === 'top' ? 0 : canvas.height - (textHeight + padding * 2);

            const totalHeight = textHeight;
            const y = blockY + padding;

            const hexToRgb = (hex) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            };

            const rgb = hexToRgb(bgColor);

            // Подложка на всю ширину
            if (gradientType === 'solid') {
                ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
            } else if (gradientType === 'vertical') {
                const gradient = ctx.createLinearGradient(0, y, 0, y + totalHeight);
                gradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                gradient.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                ctx.fillStyle = gradient;
            } else if (gradientType === 'vertical-reverse') {
                const gradient = ctx.createLinearGradient(0, y, 0, y + totalHeight);
                gradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                gradient.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                ctx.fillStyle = gradient;
            } else if (gradientType === 'horizontal') {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                gradient.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                ctx.fillStyle = gradient;
            } else if (gradientType === 'horizontal-reverse') {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                gradient.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                ctx.fillStyle = gradient;
            } else if (gradientType === 'radial') {
                const gradient = ctx.createRadialGradient(canvas.width / 2, y + totalHeight / 2, 0, canvas.width / 2, y + totalHeight / 2, canvas.width / 2);
                gradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`);
                gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
                ctx.fillStyle = gradient;
            }

            ctx.fillRect(0, y, canvas.width, totalHeight);

            ctx.font = `bold ${size}px "${font}"`;
            ctx.textAlign = align;
            ctx.textBaseline = 'middle';

            // Вычисляем границы с учётом эмоджи
            let leftBound = sidePadding;
            let rightBound = canvas.width - sidePadding;

            if (textBlock === 'top') {
                if (cornerEmojis.tl) leftBound = Math.max(leftBound, emojiPadding * 2 + emojiSize);
                if (cornerEmojis.tr) rightBound = Math.min(rightBound, canvas.width - emojiPadding * 2 - emojiSize);
            } else {
                if (cornerEmojis.bl) leftBound = Math.max(leftBound, emojiPadding * 2 + emojiSize);
                if (cornerEmojis.br) rightBound = Math.min(rightBound, canvas.width - emojiPadding * 2 - emojiSize);
            }

            let textX;
            if (align === 'left') {
                textX = leftBound;
            } else if (align === 'right') {
                textX = rightBound;
            } else {
                textX = (leftBound + rightBound) / 2;
            }

            if (textSettings[textBlock].usePattern) {
                ctx.fillStyle = createPattern(textBlock, size);
            } else {
                ctx.fillStyle = color;
            }

            lines.forEach((line, index) => {
                const lineY = y + (index + 0.5) * lineHeight;

                if (shadow) {
                    const shadowRgb = hexToRgb(shadowColor);
                    ctx.shadowColor = `rgba(${shadowRgb.r}, ${shadowRgb.g}, ${shadowRgb.b}, 0.8)`;
                    ctx.shadowBlur = shadowBlur;
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 3;
                } else {
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }

                if (stroke) {
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = strokeWidth;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    ctx.strokeText(line, textX, lineY);

                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }

                ctx.fillText(line, textX, lineY);
            });

            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        function exportPostcard() {
            if (selectedObject) {
                selectedObject = null;
                updateObjectsList();
                redraw();
            }

            const link = document.createElement('a');
            link.download = 'postcard.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }

        redraw();
    </script>
